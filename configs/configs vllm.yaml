llm_config:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  max_token: 512
  temperature: 0.1
  num_comps: 1
  llm_type: "vllm"  # openai, vllm, huggingface

vllm_config:
  server_url: "http://localhost:8000"
  max_model_len: 8192
  gpu_memory_utilization: 0.9
  tensor_parallel_size: 1

huggingface_config:
  model_path: "./models"
  device: "auto"
  trust_remote_code: true